spring:
  application:
    name: kryxhub
  datasource:
    url: postgresql://kryxhub_db_user:bZKBJVHQtr2Q83X6YvkEWj5k2Y62dtoU@dpg-d7pi0vgsfn5c73dhjbkg-a/kryxhub_db
    username: kryxhub_db_user
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update

    show-sql: true

    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  data:
    redis:
      host: redis-13917.crce276.ap-south-1-3.ec2.cloud.redislabs.com
      port: 13917
      username: default
      password: ${REDIS_PASSWORD}

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
          discord:
            client-id: ${DISCORD_CLIENT_ID}
            client-secret: ${DISCORD_CLIENT_SECRET}
            redirect-uri: ${DISCORD_REDIRECT_URI}

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.springframework.web: TRACE


stripe:
  api:
    key: ${STRIPE_TEST_KEY}
  webhook:
    secret: ${STRIPE_WEBHOOK_SECRET}

youtube:
  api-key: ${YOUTUBE_API_KEY}

vimeo:
  access-token: ${VIMEO_ACCESS_TOKEN}

twitch:
  client-id: ${TWITCH_CLIENT_ID}
  client-secret: ${TWITCH_CLIENT_SECRET}

resend:
  api-key: ${RESEND_API_KEY}

rsa:
  private-key: ${PRIVATE_KEY_PATH:classpath:certs/private.pem}
  public-key: classpath:certs/public.pem
